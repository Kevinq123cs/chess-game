<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Explorer</title>
<style>
  .viz-root {
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --ink-1: #0b0b0b;
    --ink-2: #52514e;
    --ink-3: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --s1: #2a78d6;  /* blue   */
    --s2: #1baf7a;  /* aqua   */
    --s3: #eda100;  /* yellow */
    --s4: #008300;  /* green  */
    --s5: #4a3aa7;  /* violet */
    --s6: #e34948;  /* red    */
    --accent: #2a78d6;
    --wash: rgba(42,120,214,0.08);
  }
  @media (prefers-color-scheme: dark) {
    .viz-root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --ink-1: #ffffff;
      --ink-2: #c3c2b7;
      --ink-3: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255,255,255,0.10);
      --s1: #3987e5;
      --s2: #199e70;
      --s3: #c98500;
      --s4: #008300;
      --s5: #9085e9;
      --s6: #e66767;
      --accent: #3987e5;
      --wash: rgba(57,135,229,0.14);
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body.viz-root {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page); color: var(--ink-1);
    font-size: 13px; line-height: 1.45;
  }
  header.masthead {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  header.masthead h1 { font-size: 19px; font-weight: 650; }
  header.masthead .ticker { color: var(--ink-2); font-size: 13px; }
  header.masthead .srcnote { margin-left: auto; color: var(--ink-3); font-size: 12px; }

  .layout { display: flex; min-height: calc(100vh - 60px); }

  /* ---- catalog sidebar ---- */
  nav.catalog {
    width: 248px; flex: none; padding: 14px 10px 32px;
    border-right: 1px solid var(--border); overflow-y: auto;
  }
  nav.catalog h2 {
    font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--ink-3); padding: 12px 10px 4px;
  }
  nav.catalog button.item {
    display: flex; width: 100%; align-items: center; gap: 6px;
    padding: 5px 10px; border: 0; border-radius: 6px; cursor: pointer;
    background: transparent; color: var(--ink-2); font: inherit; text-align: left;
  }
  nav.catalog button.item:hover { background: var(--wash); }
  nav.catalog button.item[aria-pressed="true"] { background: var(--wash); color: var(--ink-1); font-weight: 600; }
  nav.catalog .badges { margin-left: auto; display: flex; gap: 3px; }
  nav.catalog .badge {
    font-size: 9px; font-weight: 600; letter-spacing: .03em; color: var(--ink-3);
    border: 1px solid var(--border); border-radius: 3px; padding: 0 3px;
  }

  /* ---- main pane ---- */
  main.pane { flex: 1; min-width: 0; padding: 16px 24px 48px; }

  .filters {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 0 0 14px;
  }
  .filters .group { display: flex; align-items: center; gap: 7px; }
  .filters label.glabel { color: var(--ink-3); font-size: 12px; }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; background: var(--surface-1); }
  .seg button {
    border: 0; background: transparent; color: var(--ink-2); font: inherit; font-size: 12px;
    padding: 4px 11px; cursor: pointer;
  }
  .seg button + button { border-left: 1px solid var(--border); }
  .seg button[aria-pressed="true"] { background: var(--wash); color: var(--ink-1); font-weight: 600; }
  .seg button:disabled { opacity: .38; cursor: default; }
  select.ctl {
    font: inherit; font-size: 12px; color: var(--ink-1);
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 7px;
    padding: 4px 8px; max-width: 210px;
  }

  .card {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px 12px; margin-bottom: 14px;
  }
  .card .cardhead { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .card h3 { font-size: 14px; font-weight: 650; }
  .card h3 .exh { color: var(--ink-3); font-weight: 600; }
  .card .unit { color: var(--ink-3); font-size: 12px; }
  .card .legend { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
  .legend .key { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-2); font-size: 12px; }
  .legend .swatch-rect { width: 10px; height: 10px; border-radius: 2px; }
  .legend .swatch-line { width: 14px; height: 2px; border-radius: 1px; }
  .card .footnote { color: var(--ink-3); font-size: 11px; padding-top: 8px; }
  .chartbox { position: relative; }
  .chartbox svg { display: block; }
  .chartbox [tabindex]:focus { outline: none; } /* crosshair + tooltip serve as the focus indicator */
  svg text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }

  /* stat tiles (SOTP headline row) */
  .tiles { display: flex; gap: 28px; flex-wrap: wrap; padding: 8px 0 4px; }
  .tile .tlabel { font-size: 11px; color: var(--ink-3); }
  .tile .tvalue { font-size: 20px; font-weight: 650; color: var(--ink-1); }

  .tooltip {
    position: absolute; pointer-events: none; z-index: 5; display: none;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,.14); padding: 8px 10px; min-width: 130px;
  }
  .tooltip .tt-title { color: var(--ink-3); font-size: 11px; margin-bottom: 4px; }
  .tooltip .tt-row { display: flex; align-items: center; gap: 7px; padding: 1px 0; }
  .tooltip .tt-key { width: 12px; height: 2px; border-radius: 1px; flex: none; }
  .tooltip .tt-name { color: var(--ink-2); font-size: 11px; }
  .tooltip .tt-val { margin-left: auto; font-weight: 650; font-size: 12px; font-variant-numeric: tabular-nums; padding-left: 10px; }

  table.dataview { border-collapse: collapse; width: 100%; margin-top: 6px; }
  table.dataview th, table.dataview td {
    font-size: 12px; padding: 3px 10px; text-align: right;
    font-variant-numeric: tabular-nums; border-bottom: 1px solid var(--grid);
  }
  table.dataview th { color: var(--ink-3); font-weight: 600; }
  table.dataview td:first-child, table.dataview th:first-child { text-align: left; color: var(--ink-2); }
  table.dataview td.txt { text-align: left; color: var(--ink-3); }
  table.dataview tr.total td { font-weight: 650; color: var(--ink-1); }
  .note-inline { color: var(--ink-3); font-size: 12px; padding: 4px 0 10px; }
</style>
</head>
<body class="viz-root">
<header class="masthead">
  <h1 id="hd-title">Model Explorer</h1>
  <span class="ticker" id="hd-ticker"></span>
  <span class="srcnote" id="hd-srcnote"></span>
</header>

<div class="layout">
  <nav class="catalog" id="catalog" aria-label="Metric catalog"></nav>
  <main class="pane">
    <div class="filters" id="filters"></div>
    <div id="charts"></div>
  </main>
</div>

<div class="tooltip" id="tooltip"></div>

<script id="model-data" type="application/json">__DATA__</script>
<script>
'use strict';
const DATA = JSON.parse(document.getElementById('model-data').textContent);
const METRICS = Object.fromEntries(DATA.metrics.map(m => [m.id, m]));
const SRC_KEYS = Object.keys(DATA.sources);
const CCY = DATA.currency || 'RMB';

const css = name => getComputedStyle(document.body).getPropertyValue(name).trim();
const SLOTS = () => [css('--s1'), css('--s2'), css('--s3'), css('--s4'), css('--s5'), css('--s6')];
const COLORS = () => Object.fromEntries(SRC_KEYS.map((k, i) => [k, SLOTS()[i]]));

/* masthead */
const EST0 = Math.min(...SRC_KEYS.map(k => DATA.sources[k].estFrom));
document.title = `${DATA.company} — Model Explorer`;
document.getElementById('hd-title').textContent = `${DATA.company} — Model Explorer`;
document.getElementById('hd-ticker').textContent = `${DATA.tickers} · ${DATA.unitNote}`;
document.getElementById('hd-srcnote').textContent =
  SRC_KEYS.map(k => `${k} model as of ${DATA.sources[k].asOf}`).join(' · ') + ` · ${EST0}E onwards are estimates`;

/* segment views derived from the data */
const SEG_VIEWS = {};
for (const src of SRC_KEYS) {
  const sg = (DATA.segments || {})[src];
  if (!sg) continue;
  if (sg.revenue) {
    SEG_VIEWS['seg_rev_' + src] = { label: 'Revenue by segment', src, kind: 'stack' };
    SEG_VIEWS['seg_mix_' + src] = { label: 'Revenue mix by segment', src, kind: 'mix' };
  }
  if (sg.grossMargin) SEG_VIEWS['seg_gm_' + src] = { label: 'Gross margin by segment', src, kind: 'lines' };
}
const HAS_SOTP = !!(DATA.sotp && Object.keys(DATA.sotp.sources).length);

const state = {
  metric: DATA.metrics[0].id,                       // metric id | SEG_VIEWS key | 'sotp'
  source: SRC_KEYS.length > 1 ? 'Both' : SRC_KEYS[0],
  range: 'all',                                     // all | y10 | y5 | fcst
  compare: '',
  mode: 'panels',                                   // panels | overlay | indexed | scatter
  table: false,
};

const MIN_YEAR = Math.min(...SRC_KEYS.map(k => DATA.sources[k].years[0]));
const RANGES = { all: MIN_YEAR, y10: EST0 - 10, y5: EST0 - 5, fcst: EST0 - 3 };

/* ---------- formatting ---------- */
function fmt(v, unit, scale) {
  if (v == null) return '–';
  switch (unit) {
    case 'rmbmn': {
      if (scale === 'bn') return (v / 1000).toLocaleString('en-US', { maximumFractionDigits: Math.abs(v) >= 100000 ? 0 : 1 });
      return Math.round(v).toLocaleString('en-US');
    }
    case 'pct':  return (v * 100).toFixed(1) + '%';
    case 'x':    return v.toFixed(1) + 'x';
    case 'days': return Math.round(v).toString();
    case 'rmb':  return v.toFixed(2);
    case 'idx':  return v.toFixed(0);
    default:     return String(v);
  }
}
function unitLabel(unit, scale) {
  return {
    rmbmn: scale === 'bn' ? `${CCY} bn` : `${CCY} mn`,
    pct: '%', x: 'multiple (x)', days: 'days',
    rmb: `${CCY} / share`, idx: 'indexed, base = 100',
  }[unit] || '';
}

/* ---------- series assembly ---------- */
function metricSeries(id, sources) {
  const m = METRICS[id], out = [];
  for (const src of sources) {
    const vals = m.series[src];
    if (!vals) continue;
    const meta = DATA.sources[src];
    out.push({ name: src, color: COLORS()[src], years: meta.years, values: vals, estFrom: meta.estFrom, unit: m.unit });
  }
  return out;
}
function availableSources(id) { return Object.keys(METRICS[id].series); }

function clipToRange(s, fromYear) {
  const i0 = s.years.findIndex(y => y >= fromYear);
  return { ...s, years: s.years.slice(i0), values: s.values.slice(i0) };
}

/* ---------- scales ---------- */
function niceTicks(lo, hi, n) {
  if (lo === hi) { lo -= 1; hi += 1; }
  const span = hi - lo, step0 = span / n, mag = Math.pow(10, Math.floor(Math.log10(step0)));
  const step = [1, 2, 2.5, 5, 10].map(k => k * mag).find(s => span / s <= n) || 10 * mag;
  const t0 = Math.ceil(lo / step) * step, ticks = [];
  for (let t = t0; t <= hi + 1e-9; t += step) ticks.push(Math.abs(t) < step / 1e6 ? 0 : t);
  return ticks;
}

/* ---------- SVG helpers ---------- */
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}
function roundedBarPath(x, y, w, h, r, up) {
  r = Math.min(r, w / 2, Math.abs(h));
  if (h <= 0) return '';
  if (up) return `M${x},${y + h} L${x},${y + r} Q${x},${y} ${x + r},${y} L${x + w - r},${y} Q${x + w},${y} ${x + w},${y + r} L${x + w},${y + h} Z`;
  return `M${x},${y} L${x + w},${y} L${x + w},${y + h - r} Q${x + w},${y + h} ${x + w - r},${y + h} L${x + r},${y + h} Q${x},${y + h} ${x},${y + h - r} Z`;
}

/* ---------- core time-series renderer ---------- */
const MARGIN = { top: 14, right: 16, bottom: 26, left: 56 };

function renderTimeseries(box, spec) {
  const W = box.clientWidth || 760, H = spec.height;
  const iw = W - MARGIN.left - MARGIN.right, ih = H - MARGIN.top - MARGIN.bottom;
  const years = spec.yearDomain;
  const n = years.length, band = iw / Math.max(n, 1);

  const allVals = [];
  if (spec.kind === 'stack') {
    for (let i = 0; i < n; i++) {
      let pos = 0, neg = 0;
      for (const s of spec.series) { const v = valAt(s, years[i]); if (v != null) { if (v >= 0) pos += v; else neg += v; } }
      allVals.push(pos, neg);
    }
  } else {
    for (const s of spec.series) for (const y of years) { const v = valAt(s, y); if (v != null) allVals.push(v); }
  }
  let lo = Math.min(0, ...allVals), hi = Math.max(0, ...allVals);
  if (!isFinite(lo)) { lo = 0; hi = 1; }
  const pad = (hi - lo) * 0.06; hi += pad; if (lo < 0) lo -= pad;
  const ticks = niceTicks(lo, hi, 5);
  lo = Math.min(lo, ticks[0]); hi = Math.max(hi, ticks[ticks.length - 1]);
  const yPix = v => MARGIN.top + ih - ((v - lo) / (hi - lo)) * ih;
  const xPix = i => MARGIN.left + band * i + band / 2;

  const scale = spec.unit === 'rmbmn' && Math.max(Math.abs(lo), Math.abs(hi)) >= 20000 ? 'bn' : '';
  spec.scaleUsed = scale;

  const svg = el('svg', { width: W, height: H, viewBox: `0 0 ${W} ${H}`, role: 'img' });

  for (const t of ticks) {
    el('line', { x1: MARGIN.left, x2: W - MARGIN.right, y1: yPix(t), y2: yPix(t), stroke: css('--grid'), 'stroke-width': 1 }, svg);
    el('text', { x: MARGIN.left - 8, y: yPix(t) + 3.5, 'text-anchor': 'end', 'font-size': 10.5, fill: css('--ink-3'), style: 'font-variant-numeric:tabular-nums' }, svg)
      .textContent = fmt(t, spec.unit === 'pct' ? 'pct' : spec.unit, scale).replace('%', '');
  }
  const zeroY = yPix(Math.max(lo, Math.min(0, hi)));
  el('line', { x1: MARGIN.left, x2: W - MARGIN.right, y1: zeroY, y2: zeroY, stroke: css('--baseline'), 'stroke-width': 1 }, svg);

  // estimate-region separator
  const estStarts = spec.series.map(s => s.estFrom).filter(Boolean);
  if (estStarts.length && spec.showEstShade !== false) {
    const e0 = Math.min(...estStarts), idx = years.indexOf(e0);
    if (idx > 0) {
      const xSep = MARGIN.left + band * idx;
      el('line', { x1: xSep, x2: xSep, y1: MARGIN.top, y2: MARGIN.top + ih, stroke: css('--grid'), 'stroke-width': 1 }, svg);
      el('text', { x: xSep + 4, y: MARGIN.top + 9, 'font-size': 10, fill: css('--ink-3') }, svg).textContent = 'estimates →';
    }
  }

  // x labels
  const every = band < 26 ? (band < 16 ? 3 : 2) : 1;
  years.forEach((y, i) => {
    if (i % every !== 0 && i !== n - 1) return;
    const est = spec.series.some(s => s.estFrom && y >= s.estFrom && valAt(s, y) != null);
    el('text', { x: xPix(i), y: H - 8, 'text-anchor': 'middle', 'font-size': 10.5, fill: css('--ink-3') }, svg)
      .textContent = String(y).slice(2) + (est ? 'E' : '');
  });

  /* marks */
  if (spec.kind === 'columns') {
    const s = spec.series[0];
    const bw = Math.min(24, band - 6);
    years.forEach((y, i) => {
      const v = valAt(s, y); if (v == null) return;
      const isEst = s.estFrom && y >= s.estFrom;
      const y0 = yPix(0), y1 = yPix(v);
      const top = Math.min(y0, y1), h = Math.abs(y0 - y1);
      el('path', { d: roundedBarPath(xPix(i) - bw / 2, top, bw, h, 4, v >= 0), fill: s.color, 'fill-opacity': isEst ? 0.4 : 1 }, svg);
    });
  } else if (spec.kind === 'stack') {
    const bw = Math.min(24, band - 6);
    years.forEach((y, i) => {
      let posBase = 0, negBase = 0;
      spec.series.forEach(s => {
        const v = valAt(s, y); if (v == null || v === 0) return;
        const isEst = s.estFrom && y >= s.estFrom;
        let a, b;
        if (v >= 0) { a = posBase; b = posBase + v; posBase = b; } else { a = negBase + v; b = negBase; negBase = a; }
        const yA = yPix(b), yB = yPix(a);
        const h = Math.max(0, yB - yA - 2);            // 2px surface gap between segments
        if (h < 0.5) return;
        el('rect', { x: xPix(i) - bw / 2, y: yA + 1, width: bw, height: h, rx: 1.5, fill: s.color, 'fill-opacity': isEst ? 0.45 : 1 }, svg);
      });
    });
  } else { // lines
    for (const s of spec.series) {
      const pts = years.map((y, i) => { const v = valAt(s, y); return v == null ? null : [xPix(i), yPix(v), y]; });
      const segs = { actual: [], est: [] };
      let prev = null;
      pts.forEach(p => {
        if (!p) { prev = null; return; }
        const isEst = s.estFrom && p[2] >= s.estFrom;
        const bucket = isEst ? 'est' : 'actual';
        if (prev && (prev.bucket !== bucket)) segs.est.push(['M', prev.p, p]);
        else if (prev) segs[bucket].push(['L', prev.p, p]);
        else segs[bucket].push(['S', null, p]);
        prev = { p, bucket };
      });
      const toPath = arr => {
        let d = '', last = null;
        for (const [, a, b] of arr) {
          if (a && last !== a) d += `M${a[0]},${a[1]}`;
          if (!a) { d += `M${b[0]},${b[1]}`; last = b; continue; }
          d += `L${b[0]},${b[1]}`; last = b;
        }
        return d;
      };
      const base = { fill: 'none', stroke: s.color, 'stroke-width': 2, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' };
      const dAct = toPath(segs.actual), dEst = toPath(segs.est);
      if (dAct) el('path', { ...base, d: dAct }, svg);
      if (dEst) el('path', { ...base, d: dEst, 'stroke-dasharray': '5 4' }, svg);
      const lastPt = [...pts].reverse().find(Boolean);
      if (lastPt) {
        el('circle', { cx: lastPt[0], cy: lastPt[1], r: 6, fill: css('--surface-1') }, svg);
        el('circle', { cx: lastPt[0], cy: lastPt[1], r: 4, fill: s.color }, svg);
      }
    }
  }

  /* selective direct labels: series endpoints (≤ 2 series) */
  if (spec.kind !== 'stack' && spec.series.length <= 2) {
    for (const s of spec.series) {
      const lastY = [...years].reverse().find(y => valAt(s, y) != null);
      if (lastY == null) continue;
      const i = years.indexOf(lastY), v = valAt(s, lastY);
      el('text', { x: xPix(i), y: yPix(v) - 10, 'text-anchor': 'middle', 'font-size': 10.5, 'font-weight': 650, fill: css('--ink-2'), style: 'font-variant-numeric:tabular-nums' }, svg)
        .textContent = fmt(v, spec.unit, scale);
    }
  }

  /* hover layer: crosshair + tooltip */
  const hair = el('line', { y1: MARGIN.top, y2: MARGIN.top + ih, stroke: css('--baseline'), 'stroke-width': 1, visibility: 'hidden' }, svg);
  const overlay = el('rect', { x: MARGIN.left, y: MARGIN.top, width: iw, height: ih, fill: 'transparent', tabindex: 0 }, svg);
  const show = i => {
    hair.setAttribute('x1', xPix(i)); hair.setAttribute('x2', xPix(i));
    hair.setAttribute('visibility', 'visible');
    const rows = spec.series
      .map(s => ({ name: spec.kind === 'stack' || spec.series.length > 1 ? s.name : (METRICS[state.metric] ? METRICS[state.metric].label : s.name), color: s.color, v: valAt(s, years[i]) }))
      .filter(r => r.v != null);
    const est = spec.series.some(s => s.estFrom && years[i] >= s.estFrom);
    showTooltip(box, xPix(i), MARGIN.top, `${years[i]}${est ? 'E' : ''}`, rows.map(r => ({ ...r, text: fmt(r.v, spec.unit, scale) })));
  };
  overlay.addEventListener('pointermove', ev => {
    const r = svg.getBoundingClientRect();
    const i = Math.max(0, Math.min(n - 1, Math.floor((ev.clientX - r.left - MARGIN.left) / band)));
    show(i);
  });
  overlay.addEventListener('pointerleave', () => { hair.setAttribute('visibility', 'hidden'); hideTooltip(); });
  let focusI = n - 1;
  overlay.addEventListener('keydown', ev => {
    if (ev.key === 'ArrowLeft') focusI = Math.max(0, focusI - 1);
    else if (ev.key === 'ArrowRight') focusI = Math.min(n - 1, focusI + 1);
    else return;
    ev.preventDefault(); show(focusI);
  });
  overlay.addEventListener('focus', () => show(focusI));
  overlay.addEventListener('blur', () => { hair.setAttribute('visibility', 'hidden'); hideTooltip(); });

  box.appendChild(svg);
  return spec;
}

function valAt(s, year) {
  const i = s.years.indexOf(year);
  return i < 0 ? null : s.values[i];
}

/* ---------- scatter renderer ---------- */
function renderScatter(box, a, b, sourceName) {
  const W = box.clientWidth || 760, H = 380;
  const M = { top: 16, right: 20, bottom: 40, left: 62 };
  const iw = W - M.left - M.right, ih = H - M.top - M.bottom;
  const pts = [];
  for (const y of a.years) {
    const va = valAt(a, y), vb = valAt(b, y);
    if (va != null && vb != null) pts.push({ y, va, vb, est: (a.estFrom && y >= a.estFrom) });
  }
  const xs = pts.map(p => p.va), ys = pts.map(p => p.vb);
  let xlo = Math.min(...xs), xhi = Math.max(...xs), ylo = Math.min(...ys), yhi = Math.max(...ys);
  const xp = (xhi - xlo) * 0.08 || 1, yp = (yhi - ylo) * 0.08 || 1;
  xlo -= xp; xhi += xp; ylo -= yp; yhi += yp;
  const xT = niceTicks(xlo, xhi, 6), yT = niceTicks(ylo, yhi, 5);
  const X = v => M.left + ((v - xlo) / (xhi - xlo)) * iw;
  const Y = v => M.top + ih - ((v - ylo) / (yhi - ylo)) * ih;
  const xScale = a.unit === 'rmbmn' && Math.max(Math.abs(xlo), Math.abs(xhi)) >= 20000 ? 'bn' : '';
  const yScale = b.unit === 'rmbmn' && Math.max(Math.abs(ylo), Math.abs(yhi)) >= 20000 ? 'bn' : '';

  const svg = el('svg', { width: W, height: H, viewBox: `0 0 ${W} ${H}`, role: 'img' });
  for (const t of yT) {
    el('line', { x1: M.left, x2: W - M.right, y1: Y(t), y2: Y(t), stroke: css('--grid'), 'stroke-width': 1 }, svg);
    el('text', { x: M.left - 8, y: Y(t) + 3.5, 'text-anchor': 'end', 'font-size': 10.5, fill: css('--ink-3'), style: 'font-variant-numeric:tabular-nums' }, svg).textContent = fmt(t, b.unit, yScale).replace('%', '');
  }
  for (const t of xT) {
    el('text', { x: X(t), y: H - 22, 'text-anchor': 'middle', 'font-size': 10.5, fill: css('--ink-3'), style: 'font-variant-numeric:tabular-nums' }, svg).textContent = fmt(t, a.unit, xScale).replace('%', '');
  }
  el('line', { x1: M.left, x2: W - M.right, y1: M.top + ih, y2: M.top + ih, stroke: css('--baseline'), 'stroke-width': 1 }, svg);
  el('text', { x: M.left + iw / 2, y: H - 5, 'text-anchor': 'middle', 'font-size': 11, fill: css('--ink-2') }, svg)
    .textContent = `${METRICS[state.metric].label} (${unitLabel(a.unit, xScale)})`;
  const yl = el('text', { x: 14, y: M.top + ih / 2, 'font-size': 11, fill: css('--ink-2'), transform: `rotate(-90 14 ${M.top + ih / 2})`, 'text-anchor': 'middle' }, svg);
  yl.textContent = `${METRICS[state.compare].label} (${unitLabel(b.unit, yScale)})`;

  const c = css('--s1');
  pts.forEach((p, idx) => {
    el('circle', { cx: X(p.va), cy: Y(p.vb), r: 7, fill: css('--surface-1') }, svg);
    el('circle', { cx: X(p.va), cy: Y(p.vb), r: 5, fill: c, 'fill-opacity': p.est ? 0.4 : 1 }, svg);
    if (idx === 0 || idx === pts.length - 1) {
      el('text', { x: X(p.va) + 9, y: Y(p.vb) + 3.5, 'font-size': 10.5, 'font-weight': 650, fill: css('--ink-2') }, svg)
        .textContent = p.y + (p.est ? 'E' : '');
    }
    const hit = el('circle', { cx: X(p.va), cy: Y(p.vb), r: 14, fill: 'transparent', tabindex: 0 }, svg);
    const showP = () => showTooltip(box, X(p.va), Y(p.vb) - 10, `${p.y}${p.est ? 'E' : ''} · ${sourceName}`, [
      { name: METRICS[state.metric].label, color: c, text: fmt(p.va, a.unit, xScale) },
      { name: METRICS[state.compare].label, color: c, text: fmt(p.vb, b.unit, yScale) },
    ]);
    hit.addEventListener('pointerenter', showP);
    hit.addEventListener('focus', showP);
    hit.addEventListener('pointerleave', hideTooltip);
    hit.addEventListener('blur', hideTooltip);
  });
  box.appendChild(svg);
}

/* ---------- SOTP renderer ---------- */
function renderSotp(root) {
  const so = DATA.sotp;
  const keys = (state.source === 'Both' ? Object.keys(so.sources) : [state.source]).filter(k => so.sources[k]);
  if (!keys.length) { keys.push(...Object.keys(so.sources)); }
  const groupColor = {};
  so.groups.forEach((g, i) => { groupColor[g.id] = SLOTS()[i % 6]; });
  const groupLabel = Object.fromEntries(so.groups.map(g => [g.id, g.label]));

  /* headline stat tiles per bank */
  for (const k of keys) {
    const card = document.createElement('div'); card.className = 'card';
    const h = document.createElement('h3'); h.textContent = `${DATA.sources[k].name} — sum-of-the-parts (${DATA.sources[k].asOf})`;
    card.appendChild(h);
    const row = document.createElement('div'); row.className = 'tiles';
    for (const st of so.sources[k].stats) {
      const t = document.createElement('div'); t.className = 'tile';
      const l = document.createElement('div'); l.className = 'tlabel'; l.textContent = st.label;
      const v = document.createElement('div'); v.className = 'tvalue'; v.textContent = st.value;
      t.append(l, v); row.appendChild(t);
    }
    card.appendChild(row);
    root.appendChild(card);
  }

  /* composition chart: one horizontal stacked bar per bank */
  const legend = so.groups
    .filter(g => keys.some(k => so.sources[k].parts.some(p => p.group === g.id)))
    .map(g => ({ name: g.label, color: groupColor[g.id] }));
  const { box } = chartCard(root, 'SOTP equity value composition', `${CCY} bn`, legend, sourceFootnote(keys) + ' Hover a segment for the valuation basis.');
  renderSotpBars(box, keys, so, groupColor);

  /* parts tables (the data twin — always visible) */
  for (const k of keys) {
    const s = so.sources[k];
    const card = document.createElement('div'); card.className = 'card';
    const h = document.createElement('h3'); h.textContent = `${DATA.sources[k].name} — SOTP detail (${CCY} mn)`;
    card.appendChild(h);
    const tbl = document.createElement('table'); tbl.className = 'dataview';
    const hasOld = s.parts.some(p => p.old != null);
    const thr = document.createElement('tr');
    for (const c of ['Part', 'Valuation basis', `Value (${CCY} mn)`, '% of total', ...(hasOld ? ['Prior est.', 'Δ'] : [])]) {
      const th = document.createElement('th'); th.textContent = c; thr.appendChild(th);
    }
    thr.children[1].style.textAlign = 'left';
    tbl.appendChild(thr);
    for (const p of s.parts) {
      const tr = document.createElement('tr');
      const td0 = document.createElement('td'); td0.textContent = p.name;
      const swatch = document.createElement('span');
      swatch.style.cssText = `display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;background:${groupColor[p.group]}`;
      td0.prepend(swatch);
      const td1 = document.createElement('td'); td1.className = 'txt'; td1.textContent = p.basis;
      const td2 = document.createElement('td'); td2.textContent = fmt(p.value, 'rmbmn');
      const td3 = document.createElement('td'); td3.textContent = s.total ? (p.value / s.total * 100).toFixed(1) + '%' : '–';
      tr.append(td0, td1, td2, td3);
      if (hasOld) {
        const td4 = document.createElement('td'); td4.textContent = p.old != null ? fmt(p.old, 'rmbmn') : '–';
        const td5 = document.createElement('td'); td5.textContent = p.old ? ((p.value / p.old - 1) * 100).toFixed(1) + '%' : '–';
        tr.append(td4, td5);
      }
      tbl.appendChild(tr);
    }
    const tr = document.createElement('tr'); tr.className = 'total';
    const c0 = document.createElement('td'); c0.textContent = 'Total equity value';
    const c1 = document.createElement('td');
    const c2 = document.createElement('td'); c2.textContent = fmt(s.total, 'rmbmn');
    const c3 = document.createElement('td'); c3.textContent = '100%';
    tr.append(c0, c1, c2, c3);
    if (hasOld) {
      const c4 = document.createElement('td'); c4.textContent = s.oldTotal != null ? fmt(s.oldTotal, 'rmbmn') : '–';
      const c5 = document.createElement('td'); c5.textContent = s.oldTotal ? ((s.total / s.oldTotal - 1) * 100).toFixed(1) + '%' : '–';
      tr.append(c4, c5);
    }
    tbl.appendChild(tr);
    const wrap = document.createElement('div'); wrap.style.overflowX = 'auto'; wrap.appendChild(tbl);
    card.appendChild(wrap);
    root.appendChild(card);
  }
}

function renderSotpBars(box, keys, so, groupColor) {
  const W = box.clientWidth || 760;
  const left = 130, right = 60, rowH = 56, axisH = 26;
  const H = keys.length * rowH + axisH + 8;
  const iw = W - left - right;
  const maxTotal = Math.max(...keys.map(k => so.sources[k].total));
  const X = v => left + (v / maxTotal) * iw;

  const svg = el('svg', { width: W, height: H, viewBox: `0 0 ${W} ${H}`, role: 'img' });
  const ticks = niceTicks(0, maxTotal, 5);
  for (const t of ticks) {
    el('line', { x1: X(t), x2: X(t), y1: 6, y2: H - axisH, stroke: css('--grid'), 'stroke-width': 1 }, svg);
    el('text', { x: X(t), y: H - 10, 'text-anchor': 'middle', 'font-size': 10.5, fill: css('--ink-3'), style: 'font-variant-numeric:tabular-nums' }, svg)
      .textContent = (t / 1000).toLocaleString('en-US');
  }
  el('line', { x1: left, x2: left, y1: 6, y2: H - axisH, stroke: css('--baseline'), 'stroke-width': 1 }, svg);

  keys.forEach((k, r) => {
    const s = so.sources[k];
    const yMid = 8 + r * rowH + rowH / 2 - 4;
    el('text', { x: left - 10, y: yMid + 4, 'text-anchor': 'end', 'font-size': 12, 'font-weight': 600, fill: css('--ink-2') }, svg)
      .textContent = DATA.sources[k].name;
    let cum = 0;
    for (const p of s.parts) {
      const x0 = X(cum), x1 = X(cum + p.value);
      cum += p.value;
      const w = Math.max(0, x1 - x0 - 2);            // 2px surface gap
      if (w < 0.5) continue;
      const rect = el('rect', { x: x0 + 1, y: yMid - 12, width: w, height: 24, rx: 2, fill: groupColor[p.group], tabindex: 0 }, svg);
      const showP = () => showTooltip(box, (x0 + x1) / 2, yMid - 18, `${DATA.sources[k].name} — ${p.name}`, [
        { name: 'Value', color: groupColor[p.group], text: `${CCY} ${(p.value / 1000).toFixed(1)}bn` },
        { name: '% of total', color: groupColor[p.group], text: (p.value / s.total * 100).toFixed(1) + '%' },
        { name: 'Basis', color: groupColor[p.group], text: p.basis },
      ]);
      rect.addEventListener('pointerenter', showP);
      rect.addEventListener('focus', showP);
      rect.addEventListener('pointerleave', hideTooltip);
      rect.addEventListener('blur', hideTooltip);
    }
    el('text', { x: X(s.total) + 8, y: yMid + 4, 'font-size': 11, 'font-weight': 650, fill: css('--ink-1'), style: 'font-variant-numeric:tabular-nums' }, svg)
      .textContent = (s.total / 1000).toFixed(1);
  });
  box.appendChild(svg);
}

/* ---------- tooltip ---------- */
const tt = document.getElementById('tooltip');
function showTooltip(box, xInBox, yInBox, title, rows) {
  tt.replaceChildren();
  const t = document.createElement('div'); t.className = 'tt-title'; t.textContent = title; tt.appendChild(t);
  for (const r of rows) {
    const row = document.createElement('div'); row.className = 'tt-row';
    const key = document.createElement('span'); key.className = 'tt-key'; key.style.background = r.color;
    const nm = document.createElement('span'); nm.className = 'tt-name'; nm.textContent = r.name;
    const vl = document.createElement('span'); vl.className = 'tt-val'; vl.textContent = r.text;
    if (r.text && r.text.length > 24) { vl.style.fontWeight = '400'; vl.style.fontSize = '11px'; vl.style.maxWidth = '220px'; }
    row.append(key, nm, vl); tt.appendChild(row);
  }
  tt.style.display = 'block';
  const br = box.getBoundingClientRect();
  let px = br.left + window.scrollX + xInBox + 14;
  let py = br.top + window.scrollY + yInBox + 6;
  if (px + tt.offsetWidth > window.scrollX + document.documentElement.clientWidth - 12) px -= tt.offsetWidth + 26;
  tt.style.left = px + 'px'; tt.style.top = py + 'px';
}
function hideTooltip() { tt.style.display = 'none'; }

/* ---------- catalog sidebar ---------- */
function catalogItem(nav, label, badges, id) {
  const b = document.createElement('button');
  b.className = 'item'; b.type = 'button';
  b.setAttribute('aria-pressed', state.metric === id);
  const lbl = document.createElement('span'); lbl.textContent = label;
  const bd = document.createElement('span'); bd.className = 'badges';
  for (const s of badges) { const x = document.createElement('span'); x.className = 'badge'; x.textContent = s; bd.appendChild(x); }
  b.append(lbl, bd);
  b.addEventListener('click', () => { state.metric = id; render(); });
  nav.appendChild(b);
}

function buildCatalog() {
  const nav = document.getElementById('catalog');
  nav.replaceChildren();
  const cats = [];
  for (const m of DATA.metrics) if (!cats.includes(m.category)) cats.push(m.category);
  for (const cat of cats) {
    const h = document.createElement('h2'); h.textContent = cat; nav.appendChild(h);
    for (const m of DATA.metrics.filter(x => x.category === cat)) {
      catalogItem(nav, m.label, Object.keys(m.series), m.id);
    }
  }
  if (Object.keys(SEG_VIEWS).length) {
    const h = document.createElement('h2'); h.textContent = 'Segments'; nav.appendChild(h);
    for (const [id, sv] of Object.entries(SEG_VIEWS)) catalogItem(nav, sv.label, [sv.src], id);
  }
  if (HAS_SOTP) {
    const h = document.createElement('h2'); h.textContent = 'Valuation — SOTP'; nav.appendChild(h);
    catalogItem(nav, 'Sum-of-the-parts', Object.keys(DATA.sotp.sources), 'sotp');
  }
}

/* ---------- filter row ---------- */
function segControl(labelText, options, current, onPick, disabledSet) {
  const g = document.createElement('div'); g.className = 'group';
  if (labelText) { const l = document.createElement('label'); l.className = 'glabel'; l.textContent = labelText; g.appendChild(l); }
  const wrap = document.createElement('div'); wrap.className = 'seg';
  for (const [val, text] of options) {
    const b = document.createElement('button'); b.type = 'button'; b.textContent = text;
    b.setAttribute('aria-pressed', val === current);
    if (disabledSet && disabledSet.has(val)) b.disabled = true;
    b.addEventListener('click', () => onPick(val));
    wrap.appendChild(b);
  }
  g.appendChild(wrap);
  return g;
}

function buildFilters() {
  const f = document.getElementById('filters');
  f.replaceChildren();
  const isSeg = !!SEG_VIEWS[state.metric];
  const isSotp = state.metric === 'sotp';

  if (!isSeg) {
    const avail = isSotp ? Object.keys(DATA.sotp.sources) : availableSources(state.metric);
    const opts = [...SRC_KEYS.map(k => [k, k]), ...(SRC_KEYS.length > 1 ? [['Both', 'Both']] : [])];
    const dis = new Set(opts.map(o => o[0]).filter(s => s === 'Both' ? avail.length < 2 : !avail.includes(s)));
    f.appendChild(segControl('Source', opts, state.source, v => { state.source = v; render(); }, dis));
  }

  if (!isSotp) {
    f.appendChild(segControl('Range', [
      ['all', 'All'], ['y10', `${RANGES.y10} →`], ['y5', `${RANGES.y5} →`], ['fcst', `${RANGES.fcst} →`],
    ], state.range, v => { state.range = v; render(); }));
  }

  if (!isSeg && !isSotp) {
    const g = document.createElement('div'); g.className = 'group';
    const l = document.createElement('label'); l.className = 'glabel'; l.textContent = 'Correlate with';
    const sel = document.createElement('select'); sel.className = 'ctl';
    const o0 = document.createElement('option'); o0.value = ''; o0.textContent = 'None'; sel.appendChild(o0);
    for (const m of DATA.metrics) {
      if (m.id === state.metric) continue;
      const o = document.createElement('option'); o.value = m.id; o.textContent = m.label;
      if (m.id === state.compare) o.selected = true;
      sel.appendChild(o);
    }
    sel.addEventListener('change', () => { state.compare = sel.value; render(); });
    g.append(l, sel); f.appendChild(g);

    if (state.compare) {
      const sameUnit = METRICS[state.metric].unit === METRICS[state.compare].unit;
      const dis = new Set(sameUnit ? [] : ['overlay']);
      if (dis.has(state.mode)) state.mode = 'panels';
      f.appendChild(segControl('as', [['panels', 'Paired panels'], ['overlay', 'Overlay'], ['indexed', 'Indexed'], ['scatter', 'Scatter']], state.mode, v => { state.mode = v; render(); }, dis));
    }
  }

  if (!isSotp) {
    f.appendChild(segControl('', [['off', 'Chart'], ['on', 'Chart + table']], state.table ? 'on' : 'off', v => { state.table = v === 'on'; render(); }));
  }
}

/* ---------- cards ---------- */
let exhibitNo = 0;
function chartCard(parent, title, unitText, legendItems, footnote) {
  exhibitNo += 1;
  const card = document.createElement('div'); card.className = 'card';
  const head = document.createElement('div'); head.className = 'cardhead';
  const h = document.createElement('h3');
  const ex = document.createElement('span'); ex.className = 'exh'; ex.textContent = `Exhibit ${exhibitNo}: `;
  h.appendChild(ex); h.appendChild(document.createTextNode(title));
  const u = document.createElement('span'); u.className = 'unit'; u.textContent = unitText;
  head.append(h, u);
  if (legendItems && legendItems.length >= 2) {
    const lg = document.createElement('div'); lg.className = 'legend';
    for (const it of legendItems) {
      const k = document.createElement('span'); k.className = 'key';
      const sw = document.createElement('span'); sw.className = it.line ? 'swatch-line' : 'swatch-rect'; sw.style.background = it.color;
      const t = document.createElement('span'); t.textContent = it.name;
      k.append(sw, t); lg.appendChild(k);
    }
    head.appendChild(lg);
  }
  card.appendChild(head);
  const box = document.createElement('div'); box.className = 'chartbox'; card.appendChild(box);
  const fn = document.createElement('div'); fn.className = 'footnote'; fn.textContent = footnote; card.appendChild(fn);
  parent.appendChild(card);
  return { card, box, unitEl: u };
}

function sourceFootnote(sources) {
  const parts = sources.map(k => `${DATA.sources[k].name} model (${DATA.sources[k].asOf})`);
  return 'Source: Company data, ' + parts.join('; ') + '. Dashed / lighter marks are estimates.';
}

function tableCard(parent, title, series, unit, yearDomain, scale) {
  const card = document.createElement('div'); card.className = 'card';
  const h = document.createElement('h3');
  const uniform = series.every(s => (s.unit || unit) === unit);
  h.textContent = title + ' — data' + (unit && uniform ? ` (${unitLabel(unit, scale)})` : '');
  card.appendChild(h);
  const tbl = document.createElement('table'); tbl.className = 'dataview';
  const thr = document.createElement('tr');
  const th0 = document.createElement('th'); th0.textContent = 'Series'; thr.appendChild(th0);
  for (const y of yearDomain) { const th = document.createElement('th'); th.textContent = y; thr.appendChild(th); }
  tbl.appendChild(thr);
  for (const s of series) {
    const tr = document.createElement('tr');
    const td0 = document.createElement('td'); td0.textContent = s.name; tr.appendChild(td0);
    for (const y of yearDomain) {
      const td = document.createElement('td');
      td.textContent = fmt(valAt(s, y), s.unit || unit, scale);
      tr.appendChild(td);
    }
    tbl.appendChild(tr);
  }
  const wrap = document.createElement('div'); wrap.style.overflowX = 'auto'; wrap.appendChild(tbl);
  card.appendChild(wrap);
  parent.appendChild(card);
}

/* ---------- top-level render ---------- */
function yearDomainFor(seriesList) {
  const from = RANGES[state.range];
  const ys = new Set();
  for (const s of seriesList) s.years.forEach((y, i) => { if (y >= from && s.values[i] != null) ys.add(y); });
  return [...ys].sort((p, q) => p - q);
}

function render() {
  exhibitNo = 0;
  buildCatalog();
  buildFilters();
  const root = document.getElementById('charts');
  root.replaceChildren();
  hideTooltip();

  if (state.metric === 'sotp') return renderSotp(root);
  const segView = SEG_VIEWS[state.metric];
  if (segView) return renderSegments(root, segView);

  const m = METRICS[state.metric];
  let srcs = state.source === 'Both' ? SRC_KEYS : [state.source];
  srcs = srcs.filter(s => m.series[s]);
  if (!srcs.length) {
    srcs = availableSources(m.id);
    const n = document.createElement('div'); n.className = 'note-inline';
    n.textContent = `${m.label} is only in the ${srcs.join('/')} model — showing that instead.`;
    root.appendChild(n);
  }

  const from = RANGES[state.range];
  const primary = metricSeries(m.id, srcs).map(s => clipToRange(s, from));
  const yd = yearDomainFor(primary);
  const multi = primary.length >= 2;
  const kind = (!multi && (m.unit === 'rmbmn')) ? 'columns' : 'line';

  if (state.compare && METRICS[state.compare]) {
    const cm = METRICS[state.compare];
    const csrcs = srcs.filter(s => cm.series[s]).length ? srcs.filter(s => cm.series[s]) : availableSources(cm.id);
    const comp = metricSeries(cm.id, csrcs).map(s => clipToRange(s, from));

    if (state.mode === 'scatter') {
      const src = srcs.find(s => cm.series[s]) || csrcs[0];
      const a = clipToRange(metricSeries(m.id, [src])[0], from);
      const b = clipToRange(metricSeries(cm.id, [src])[0], from);
      const common = a.years.filter(y => valAt(a, y) != null && valAt(b, y) != null);
      const { box } = chartCard(root, `${m.label} vs ${cm.label} (${src} model, ${common[0]}–${common[common.length - 1]})`, '', [], sourceFootnote([src]) + ' Each dot is one fiscal year; lighter dots are estimate years.');
      renderScatter(box, a, b, src);
      if (state.table) tableCard(root, `${m.label} vs ${cm.label}`, [{ ...a, name: m.label }, { ...b, name: cm.label }], m.unit, yearDomainFor([a, b]));
      return;
    }

    if (state.mode === 'indexed' || state.mode === 'overlay') {
      const all = [
        ...primary.map(s => ({ ...s, name: (multi || csrcs.length > 1) ? `${m.label} (${s.name})` : m.label })),
        ...comp.map((s, i) => ({ ...s, name: (multi || csrcs.length > 1) ? `${cm.label} (${s.name})` : cm.label, color: SLOTS()[2 + i] })),
      ];
      let plot = all, unit = m.unit, title = `${m.label} vs ${cm.label}`;
      if (state.mode === 'indexed') {
        plot = all.map(s => {
          const i0 = s.values.findIndex((v, i) => v != null && s.years[i] >= from && v !== 0);
          const base = i0 >= 0 ? s.values[i0] : null;
          return { ...s, unit: 'idx', values: s.values.map(v => (v == null || base == null) ? null : (v / base) * 100) };
        });
        unit = 'idx';
        title += ' — indexed';
      }
      const ydAll = yearDomainFor(plot);
      const { box } = chartCard(root, title, unitLabel(unit), plot.map(s => ({ name: s.name, color: s.color, line: true })), sourceFootnote([...new Set([...srcs, ...csrcs])]));
      renderTimeseries(box, { kind: 'line', series: plot, unit, height: 380, yearDomain: ydAll });
      if (state.table) tableCard(root, title, plot, unit, ydAll);
      return;
    }

    // paired panels (default): shared x domain
    const ydAll = yearDomainFor([...primary, ...comp]);
    const spec1 = { kind, series: primary, unit: m.unit, height: 320, yearDomain: ydAll };
    const c1 = chartCard(root, m.label, unitLabel(m.unit), multi ? primary.map(s => ({ name: DATA.sources[s.name].name, color: s.color, line: kind === 'line' })) : [], sourceFootnote(srcs));
    renderTimeseries(c1.box, spec1);
    if (spec1.scaleUsed === 'bn') c1.unitEl.textContent = unitLabel(m.unit, 'bn');

    const ckind = (comp.length < 2 && cm.unit === 'rmbmn') ? 'columns' : 'line';
    const spec2 = { kind: ckind, series: comp, unit: cm.unit, height: 250, yearDomain: ydAll };
    const c2 = chartCard(root, cm.label, unitLabel(cm.unit), comp.length >= 2 ? comp.map(s => ({ name: DATA.sources[s.name].name, color: s.color, line: ckind === 'line' })) : [], sourceFootnote(csrcs));
    renderTimeseries(c2.box, spec2);
    if (spec2.scaleUsed === 'bn') c2.unitEl.textContent = unitLabel(cm.unit, 'bn');

    if (state.table) {
      tableCard(root, `${m.label} & ${cm.label}`, [
        ...primary.map(s => ({ ...s, name: `${m.label} (${s.name})`, unit: m.unit })),
        ...comp.map(s => ({ ...s, name: `${cm.label} (${s.name})`, unit: cm.unit })),
      ], m.unit, ydAll);
    }
    return;
  }

  /* single metric */
  const spec = { kind, series: primary, unit: m.unit, height: 400, yearDomain: yd };
  const c = chartCard(root, m.label, unitLabel(m.unit), multi ? primary.map(s => ({ name: DATA.sources[s.name].name, color: s.color, line: kind === 'line' })) : [], sourceFootnote(srcs));
  renderTimeseries(c.box, spec);
  if (spec.scaleUsed === 'bn') c.unitEl.textContent = unitLabel(m.unit, 'bn');
  if (state.table) tableCard(root, m.label, primary, m.unit, yd, spec.scaleUsed);
}

/* ---------- segment views ---------- */
function renderSegments(root, sv) {
  const from = RANGES[state.range];
  const meta = DATA.sources[sv.src];
  const slots = SLOTS();
  const sg = DATA.segments[sv.src];
  const notes = sg.notes || {};

  if (sv.kind === 'stack' || sv.kind === 'mix') {
    const raw = sg.revenue;
    const names = Object.keys(raw);
    let series = names.map((n, i) => ({ name: n, color: slots[i % slots.length], years: meta.years.slice(0, raw[n].length), values: raw[n], estFrom: meta.estFrom }));
    if (sv.kind === 'mix') {
      const denomMetric = METRICS[sg.mixOf];
      const total = denomMetric && denomMetric.series[sv.src];
      if (total) {
        series = series.map(s => ({ ...s, values: s.values.map((v, i) => (v == null || total[i] == null || total[i] === 0) ? null : v / total[i]) }));
      } else {
        const sums = meta.years.map((_, i) => names.reduce((acc, n) => acc + (raw[n][i] || 0), 0));
        series = series.map(s => ({ ...s, values: s.values.map((v, i) => (v == null || !sums[i]) ? null : v / sums[i]) }));
      }
    }
    series = series.map(s => clipToRange(s, from));
    const yd = yearDomainFor(series);
    const unit = sv.kind === 'mix' ? 'pct' : 'rmbmn';
    const title = sv.kind === 'mix' ? `Revenue mix by segment (${sv.src})` : `Revenue by segment (${sv.src})`;
    const note = notes.revenue ? ' ' + notes.revenue : '';
    const mixNote = sv.kind === 'mix' ? ' Shown as % of total group revenue.' : '';
    const { box, unitEl } = chartCard(root, title, unitLabel(unit), series.map(s => ({ name: s.name, color: s.color })), sourceFootnote([sv.src]) + note + mixNote);
    const spec = { kind: 'stack', series, unit, height: 420, yearDomain: yd };
    renderTimeseries(box, spec);
    if (spec.scaleUsed === 'bn') unitEl.textContent = unitLabel(unit, 'bn');
    if (state.table) tableCard(root, title, series, unit, yd, spec.scaleUsed);
    return;
  }

  // gross margin lines
  const gm = sg.grossMargin;
  const names = Object.keys(gm);
  const series = names.map((n, i) => clipToRange({ name: n, color: slots[i % slots.length], years: meta.years.slice(0, gm[n].length), values: gm[n], estFrom: meta.estFrom, unit: 'pct' }, from));
  const yd = yearDomainFor(series);
  const note = notes.grossMargin ? ' ' + notes.grossMargin : '';
  const { box } = chartCard(root, `Gross margin by segment (${sv.src})`, unitLabel('pct'), series.map(s => ({ name: s.name, color: s.color, line: true })), sourceFootnote([sv.src]) + note);
  renderTimeseries(box, { kind: 'line', series, unit: 'pct', height: 420, yearDomain: yd });
  if (state.table) tableCard(root, `Gross margin by segment (${sv.src})`, series, 'pct', yd);
}

let rsz;
window.addEventListener('resize', () => { clearTimeout(rsz); rsz = setTimeout(render, 150); });
render();
</script>
